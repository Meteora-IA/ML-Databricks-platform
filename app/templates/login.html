<!DOCTYPE html>
<html lang="es">

<head>

<title>Login</title>

<style>

body{
    background:#020617;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#0f172a;
    padding:40px;
    border-radius:20px;
    width:400px;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(to right,#38bdf8,#8b5cf6);
    color:white;
    font-weight:bold;
}

</style>

</head>

<body>

<form method="POST" class="card">

<h1>Iniciar Sesión</h1>

<input type="email" name="email" placeholder="Correo" required>

<input type="password" name="password" placeholder="Contraseña" required>

<button type="submit">
Entrar
</button>

</form>

</body>

</html>
