<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meteora IA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#020617;
    color:white;
}

header{
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0f172a;
}

.logo{
    font-size:30px;
    font-weight:800;
    background:linear-gradient(to right,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.buttons{
    display:flex;
    gap:15px;
}

.btn{
    padding:12px 20px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.login{
    border:1px solid rgba(255,255,255,0.1);
}

.register{
    background:linear-gradient(to right,#38bdf8,#8b5cf6);
}

.hero{
    padding:120px 40px;
    text-align:center;
}

.hero h1{
    font-size:72px;
    margin-bottom:20px;
}

.hero p{
    color:#94a3b8;
    font-size:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">
Meteora IA
</div>

<div class="buttons">

<a href="/login" class="btn login">
Iniciar Sesión
</a>

<a href="/register" class="btn register">
Crear Cuenta
</a>

</div>

</header>

<section class="hero">

<h1>
Domina AI y Databricks
</h1>

<p>
Capacitación profesional en Machine Learning y MLOps.
</p>

</section>

</body>

</html>
