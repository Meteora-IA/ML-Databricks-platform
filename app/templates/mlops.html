<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Databricks Fundamentals</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#020617;
            color:white;
        }

        .container{
            max-width:1000px;
            margin:auto;
            padding:60px 30px;
        }

        h1{
            font-size:48px;
            margin-bottom:20px;
        }

        p{
            color:#94a3b8;
            line-height:1.8;
        }

        .video{
            margin-top:40px;
            border-radius:20px;
            overflow:hidden;
        }

        iframe{

            height:550px;
        }

        .module{
            margin-top:30px;
            background:#0f172a;
            padding:25px;
            border-radius:20px;
        }

<body>

        </p>

        <div class="video">

            <iframe
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                frameborder="0"
                allowfullscreen>
            </iframe>

        </div>

        <div class="module">

            <h2>
                Módulo 1 - Introducción a Databricks
            </h2>

            <p>
                Arquitectura Lakehouse y conceptos fundamentales.
            </p>

        </div>

        <div class="module">

            <h2>
                Módulo 2 - Apache Spark
            </h2>

            <p>
                Transformaciones, actions y procesamiento distribuido.
            </p>

        </div>
